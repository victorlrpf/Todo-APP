name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: |
          dotnet workload restore
          dotnet workload install maui
          dotnet workload install maui-android

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build APK
        run: dotnet build TodoApp/TodoApp.csproj -f net8.0-android -c Release -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false

      - name: Find APK in bin directory
        shell: pwsh
        run: |
          Write-Host "Procurando APK em bin/Release..."
          $apkFile = Get-ChildItem -Path "TodoApp/bin/Release/net8.0-android" -Filter "*.apk" -Recurse | Select-Object -First 1
          
          if ($apkFile) {
            Write-Host "APK encontrado: $($apkFile.FullName)"
            Write-Host "Tamanho: $([math]::Round($apkFile.Length / 1MB, 2)) MB"
            
            # Copiar para diretório de saída
            New-Item -ItemType Directory -Path "output" -Force | Out-Null
            Copy-Item -Path $apkFile.FullName -Destination "output/$($apkFile.Name)" -Force
            Write-Host "APK copiado para output"
          } else {
            Write-Host "ERRO: APK não encontrado!"
            Write-Host "Listando conteúdo de bin/Release/net8.0-android:"
            Get-ChildItem -Path "TodoApp/bin/Release/net8.0-android" -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-APK
          path: output/*.apk
          if-no-files-found: error
