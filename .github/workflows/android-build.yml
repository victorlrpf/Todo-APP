name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: |
          dotnet workload restore
          dotnet workload install maui
          dotnet workload install maui-android

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build APK with SignAndroidPackage target
        run: dotnet build TodoApp/TodoApp.csproj -f net8.0-android -c Release -t:SignAndroidPackage -p:AndroidKeyStore=false -p:AndroidSigningKeyStore=false

      - name: Find APK in intermediate directory
        shell: pwsh
        run: |
          Write-Host "=== Procurando APK em todos os diretórios ==="
          
          # Procurar em vários locais possíveis
          $searchPaths = @(
            "TodoApp/bin/Release/net8.0-android",
            "TodoApp/obj/Release/net8.0-android",
            "TodoApp/bin/Release",
            "."
          )
          
          $apkFile = $null
          
          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              Write-Host "Procurando em: $path"
              $found = Get-ChildItem -Path $path -Filter "*.apk" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                $apkFile = $found
                Write-Host "✓ APK encontrado: $($found.FullName)"
                break
              }
            }
          }
          
          if (-not $apkFile) {
            Write-Host "✗ APK não encontrado em nenhum diretório"
            Write-Host ""
            Write-Host "=== Listando TODOS os arquivos gerados ==="
            Get-ChildItem -Path "TodoApp" -Recurse -Include "*.apk", "*.aab" -ErrorAction SilentlyContinue | ForEach-Object { 
              Write-Host "Encontrado: $($_.FullName)"
            }
            exit 1
          }
          
          # Copiar para diretório de saída
          New-Item -ItemType Directory -Path "output" -Force | Out-Null
          Copy-Item -Path $apkFile.FullName -Destination "output/$($apkFile.Name)" -Force
          Write-Host "APK copiado para output"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-APK
          path: output/*.apk
          if-no-files-found: error
