name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore TodoApp/TodoApp.csproj

      - name: Publish APK
        # Mantive o seu comando, mas adicionei a flag de KeyStore=false para garantir que o APK seja gerado sem erro de assinatura
        run: |
          dotnet publish TodoApp/TodoApp.csproj `
            -f net8.0-android `
            -c Release `
            -p:AndroidPackageFormat=apk `
            -p:AndroidKeyStore=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          # MUDANÇA CHAVE: Buscar o arquivo .apk real na pasta onde o MAUI o salva por padrão
          path: "TodoApp/bin/Release/net8.0-android/*-Signed.apk"
          if-no-files-found: error
