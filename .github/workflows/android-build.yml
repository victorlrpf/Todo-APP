name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore TodoApp/TodoApp.csproj

      - name: Publish APK
        # Removi o -o output para garantir que o APK seja gerado no local padrão corretamente
        run: |
          dotnet publish TodoApp/TodoApp.csproj `
            -f net8.0-android `
            -c Release `
            -p:AndroidPackageFormats=apk `
            -p:AndroidKeyStore=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          # Esta é a mudança chave: buscar qualquer arquivo .apk em qualquer subpasta
          # Isso garante que o instalador seja incluído no ZIP, e não as DLLs.
          path: "**/*.apk"
          if-no-files-found: error
