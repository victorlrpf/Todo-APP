name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore

      - name: Build APK
        run: dotnet publish TodoApp/TodoApp.csproj -f net8.0-android -c Debug -p:AndroidPackageFormats=apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: todoapp-apk
          path: |
            **/*.apk
