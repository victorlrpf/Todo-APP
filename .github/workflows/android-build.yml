name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: |
          dotnet workload restore
          dotnet workload install maui
          dotnet workload install maui-android

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build and Publish APK
        run: dotnet publish TodoApp/TodoApp.csproj -f net8.0-android -c Release -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false -o output

      - name: Find APK
        shell: pwsh
        run: |
          $apkFile = Get-ChildItem -Path "output" -Filter "*.apk" -Recurse | Select-Object -First 1
          if ($apkFile) {
            Write-Host "APK encontrado: $($apkFile.FullName)"
            Write-Host "Tamanho: $($apkFile.Length / 1MB) MB"
          } else {
            Write-Host "ERRO: APK não encontrado em output"
            Get-ChildItem -Path "output" -Recurse
            exit 1
          }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-APK
          path: output/*.apk
          if-no-files-found: error
