name: Build Android APK - Debug

on:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore

      - name: Publish APK
        run: dotnet publish TodoApp/TodoApp.csproj -f net8.0-android -c Release -p:AndroidPackageFormat=apk -o output

      - name: Debug - List all files in output
        shell: pwsh
        run: |
          Write-Host "=== Conteúdo do diretório output ==="
          Get-ChildItem -Path "output" -Recurse | ForEach-Object { Write-Host $_.FullName }
          
          Write-Host "`n=== Procurando por .apk ==="
          $apkFiles = Get-ChildItem -Path "output" -Filter "*.apk" -Recurse
          Write-Host "APK files encontrados: $($apkFiles.Count)"
          $apkFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }
          
          Write-Host "`n=== Procurando por .aab ==="
          $aabFiles = Get-ChildItem -Path "output" -Filter "*.aab" -Recurse
          Write-Host "AAB files encontrados: $($aabFiles.Count)"
          $aabFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }

      - name: Check bin directory
        shell: pwsh
        run: |
          Write-Host "=== Conteúdo do diretório bin ==="
          Get-ChildItem -Path "TodoApp/bin/Release/net8.0-android" -Recurse | ForEach-Object { Write-Host $_.FullName }

      - name: Find and Upload APK
        shell: pwsh
        run: |
          # Procurar em todos os possíveis locais
          $searchPaths = @(
            "output",
            "TodoApp/bin/Release/net8.0-android",
            "TodoApp/bin/Release/net8.0-android/publish"
          )
          
          $apkFile = $null
          foreach ($path in $searchPaths) {
            if (Test-Path $path) {
              $found = Get-ChildItem -Path $path -Filter "*.apk" -Recurse | Select-Object -First 1
              if ($found) {
                $apkFile = $found
                Write-Host "APK encontrado em: $($found.FullName)"
                break
              }
            }
          }
          
          if ($apkFile) {
            # Criar diretório para o artifact
            New-Item -ItemType Directory -Path "artifacts" -Force
            Copy-Item -Path $apkFile.FullName -Destination "artifacts/$($apkFile.Name)"
            Write-Host "APK copiado para artifacts"
          } else {
            Write-Host "ERRO: Nenhum APK encontrado!"
            exit 1
          }

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoApp-APK
          path: artifacts/*.apk
          if-no-files-found: error
